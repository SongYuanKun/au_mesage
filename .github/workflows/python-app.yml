name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Basic Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install black flake8

      - name: Run ruff
        run: |
          ruff --version
          ruff check src tests

      - name: Run black (check)
        run: |
          black --version
          black --check . || true

      - name: Run flake8
        run: |
          flake8 src || true

      - name: Basic syntax check
        run: |
          python -m compileall src

      - name: Unit tests
        run: |
          mkdir -p test-reports
          PYTHONPATH=src pytest tests/ -v --junitxml=test-reports/pytest.xml

      - name: RTM traceability check
        run: python tools/rtm_traceability_check.py

      - name: Upload Python test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.python-version }}
          path: test-reports/pytest.xml
          retention-days: 30

  frontend:
    name: Frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: |
          npm install -g npm@10.5.2
          npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run check

      - name: Vitest + coverage
        run: |
          mkdir -p test-reports
          npm test -- --coverage --reporter=default --reporter=junit --outputFile.junit=test-reports/vitest.xml

      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-report
          path: test-reports/vitest.xml
          retention-days: 30

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: coverage/
          retention-days: 14

      - name: Vite production build
        run: npm run build
