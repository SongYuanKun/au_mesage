<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时金价监控</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="container">

    {% include '_nav.html' %}

    <div class="content">
        <!-- Dual Price Cards: Gold + Silver -->
        <div class="grid-2">
            <div class="price-card" id="card-gold">
                <div class="price-card-header">
                    <span class="price-card-name">🥇 黄金</span>
                    <span class="price-badge neutral" id="gold-badge">--</span>
                </div>
                <div class="price-card-body">
                    <div class="price-card-label">回收价格</div>
                    <span class="price-card-value" id="gold-price">--</span>
                    <span class="price-card-unit">元/克</span>
                </div>
                <div class="price-card-stats">
                    <div class="price-stat">
                        <span class="price-stat-key">大盘价</span>
                        <span class="price-stat-val" id="gold-realtime">--</span>
                    </div>
                    <div class="price-stat">
                        <span class="price-stat-key">今日最高</span>
                        <span class="price-stat-val" id="gold-high">--</span>
                    </div>
                    <div class="price-stat">
                        <span class="price-stat-key">今日最低</span>
                        <span class="price-stat-val" id="gold-low">--</span>
                    </div>
                </div>
                <div class="price-card-time">
                    <span class="price-live-dot"></span>
                    <span id="gold-time">获取中...</span>
                </div>
            </div>

            <div class="price-card" id="card-silver">
                <div class="price-card-header">
                    <span class="price-card-name">🥈 白银</span>
                    <span class="price-badge neutral" id="silver-badge">--</span>
                </div>
                <div class="price-card-body">
                    <div class="price-card-label">回收价格</div>
                    <span class="price-card-value" id="silver-price">--</span>
                    <span class="price-card-unit">元/克</span>
                </div>
                <div class="price-card-stats">
                    <div class="price-stat">
                        <span class="price-stat-key">大盘价</span>
                        <span class="price-stat-val" id="silver-realtime">--</span>
                    </div>
                    <div class="price-stat">
                        <span class="price-stat-key">今日最高</span>
                        <span class="price-stat-val" id="silver-high">--</span>
                    </div>
                    <div class="price-stat">
                        <span class="price-stat-key">今日最低</span>
                        <span class="price-stat-val" id="silver-low">--</span>
                    </div>
                </div>
                <div class="price-card-time">
                    <span class="price-live-dot"></span>
                    <span id="silver-time">获取中...</span>
                </div>
            </div>
        </div>

        <!-- Calculator + Alert -->
        <div class="grid-2">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">🧮 价格计算器</h3>
                    <div class="type-tabs type-tabs-sm">
                        <button class="type-tab active" data-calc-type="黄 金">金</button>
                        <button class="type-tab" data-calc-type="白 银">银</button>
                    </div>
                </div>
                <p class="card-desc">输入商品价格和克重，自动计算与回收价的差额</p>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="productPrice">商品总价（元）</label>
                        <input type="number" id="productPrice" class="form-input"
                               placeholder="如 5800" step="0.01" inputmode="decimal">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="weight">克重（克）</label>
                        <input type="number" id="weight" class="form-input"
                               placeholder="如 10.5" step="0.01" inputmode="decimal">
                    </div>
                </div>

                <div class="result-panel" id="result">
                    <div class="result-grid">
                        <div class="result-item">
                            <div class="result-item-label">每克价格</div>
                            <div class="result-item-value" id="pricePerGram">-</div>
                        </div>
                        <div class="result-item">
                            <div class="result-item-label">大盘回收价</div>
                            <div class="result-item-value" id="marketPrice">-</div>
                        </div>
                    </div>
                    <div class="result-total neutral" id="differenceDisplay">差额：--</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">🔔 价格提醒</h3>
                    <div class="type-tabs type-tabs-sm">
                        <button class="type-tab active" data-alert-type="黄 金">金</button>
                        <button class="type-tab" data-alert-type="白 银">银</button>
                    </div>
                </div>
                <p class="card-desc">设置目标价格，触发后浏览器推送通知</p>

                <div class="alert-form">
                    <div class="form-group">
                        <label class="form-label" for="alertTarget">目标价格（元/克）</label>
                        <input type="number" id="alertTarget" class="form-input"
                               placeholder="如 680" step="0.01" inputmode="decimal">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="alertOp">触发条件</label>
                        <select id="alertOp" class="form-select">
                            <option value="gte">达到或超过</option>
                            <option value="lte">达到或低于</option>
                        </select>
                    </div>
                    <div class="btn-row">
                        <button id="btnSubscribe" class="btn btn-primary">订阅推送</button>
                        <button id="btnUnsubscribe" class="btn btn-secondary" disabled>取消订阅</button>
                    </div>
                    <div id="alertStatus" class="alert-status" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        数据来源于公开市场，仅供参考，不构成投资建议
    </footer>
</div>

<script>
(function(){
    var calcType = '黄 金';
    var alertType = '黄 金';

    function debounce(fn, wait) {
        var timer;
        return function() {
            var ctx = this, args = arguments;
            clearTimeout(timer);
            timer = setTimeout(function(){ fn.apply(ctx, args); }, wait);
        };
    }

    /* ---- Price Overview (both metals at once) ---- */
    function loadOverview() {
        fetch('/api/price-overview')
            .then(function(r){ return r.json(); })
            .then(function(resp){
                if (!resp.success || !resp.data) return;
                resp.data.forEach(function(item){
                    var key = null;
                    if (item.data_type === '黄 金') key = 'gold';
                    else if (item.data_type === '白 银') key = 'silver';
                    if (!key) return;
                    fillCard(key, item);
                });
            })
            .catch(function(e){ console.error('overview error', e); });
    }

    function fillCard(key, d) {
        var priceEl = document.getElementById(key + '-price');
        var badgeEl = document.getElementById(key + '-badge');
        var realtimeEl = document.getElementById(key + '-realtime');
        var highEl = document.getElementById(key + '-high');
        var lowEl = document.getElementById(key + '-low');
        var timeEl = document.getElementById(key + '-time');

        priceEl.textContent = d.recycle_price ? d.recycle_price.toFixed(2) : '--';
        realtimeEl.textContent = d.real_time_price ? d.real_time_price.toFixed(2) : '--';
        highEl.textContent = d.today_high ? d.today_high.toFixed(2) : '--';
        lowEl.textContent = d.today_low ? d.today_low.toFixed(2) : '--';

        if (d.change != null && d.change_pct != null) {
            var sign = d.change >= 0 ? '+' : '';
            badgeEl.textContent = sign + d.change.toFixed(2) + '  ' + sign + d.change_pct.toFixed(2) + '%';
            badgeEl.className = 'price-badge ' + (d.change > 0 ? 'up' : d.change < 0 ? 'down' : 'neutral');
        } else {
            badgeEl.textContent = '暂无昨日数据';
            badgeEl.className = 'price-badge neutral';
        }

        if (d.updated_at) {
            var t = new Date(d.updated_at);
            timeEl.textContent = '更新于 ' + t.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }
    }

    /* ---- Calculator ---- */
    function calculateDifference() {
        var pp = parseFloat(document.getElementById('productPrice').value);
        var w = parseFloat(document.getElementById('weight').value);
        var resultEl = document.getElementById('result');
        if (isNaN(pp) || isNaN(w) || w <= 0) { resultEl.style.display = 'none'; return; }

        fetch('/api/calculate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ product_price: pp, weight: w, data_type: calcType })
        })
        .then(function(r){ return r.json(); })
        .then(function(res){
            if (res.error) { resultEl.style.display = 'none'; return; }
            document.getElementById('pricePerGram').textContent = res.price_per_gram.toFixed(2);
            document.getElementById('marketPrice').textContent = res.market_price.toFixed(2);

            var diff = res.total_difference;
            var el = document.getElementById('differenceDisplay');
            var sign = diff > 0 ? '+' : '';
            el.textContent = '总价差：' + sign + diff.toFixed(2) + ' 元';
            el.className = 'result-total ' + (diff > 0 ? 'negative' : diff < 0 ? 'positive' : 'neutral');
            resultEl.style.display = 'block';
        })
        .catch(function(){ resultEl.style.display = 'none'; });
    }

    var debouncedCalc = debounce(calculateDifference, 300);

    /* ---- Alert Subscription (SSE) ---- */
    var alertSource = null;

    function showAlertStatus(msg) {
        var el = document.getElementById('alertStatus');
        el.textContent = msg; el.style.display = 'block';
    }

    function ensureNotifPermission() {
        try { if (Notification && Notification.permission === 'default') Notification.requestPermission(); } catch(e){}
    }

    function showNotify(title, body) {
        try {
            if (Notification && Notification.permission === 'granted') new Notification(title, { body: body });
            else showAlertStatus(title + '：' + body);
        } catch(e) { showAlertStatus(title + '：' + body); }
    }

    function subscribeAlert() {
        var target = parseFloat(document.getElementById('alertTarget').value);
        var op = document.getElementById('alertOp').value;
        if (isNaN(target)) { showAlertStatus('请输入有效的目标价格'); return; }
        ensureNotifPermission();
        alertSource = new EventSource('/api/price-alert/subscribe?data_type=' + encodeURIComponent(alertType) +
            '&target=' + encodeURIComponent(target) + '&op=' + encodeURIComponent(op) + '&auto_close=true');
        document.getElementById('btnUnsubscribe').disabled = false;
        showAlertStatus('已订阅，等待价格触发...');

        alertSource.addEventListener('alert', function(ev){
            try {
                var d = JSON.parse(ev.data);
                var opText = op === 'gte' ? '达到或超过' : '达到或低于';
                showNotify('价格触发', '当前 ' + d.price + ' 元/克，已' + opText + ' ' + target);
                showAlertStatus('已触发通知');
                unsubscribeAlert();
            } catch(e){}
        });
        alertSource.addEventListener('error', function(){ showAlertStatus('连接中断，请重试'); });
    }

    function unsubscribeAlert() {
        if (alertSource) { alertSource.close(); alertSource = null; }
        document.getElementById('btnUnsubscribe').disabled = true;
    }

    /* ---- Init ---- */
    document.addEventListener('DOMContentLoaded', function(){
        loadOverview();

        document.getElementById('productPrice').addEventListener('input', debouncedCalc);
        document.getElementById('weight').addEventListener('input', debouncedCalc);
        document.getElementById('btnSubscribe').addEventListener('click', subscribeAlert);
        document.getElementById('btnUnsubscribe').addEventListener('click', unsubscribeAlert);

        document.querySelectorAll('[data-calc-type]').forEach(function(btn){
            btn.addEventListener('click', function(){
                calcType = this.getAttribute('data-calc-type');
                document.querySelectorAll('[data-calc-type]').forEach(function(b){
                    b.classList.toggle('active', b.getAttribute('data-calc-type') === calcType);
                });
                debouncedCalc();
            });
        });

        document.querySelectorAll('[data-alert-type]').forEach(function(btn){
            btn.addEventListener('click', function(){
                alertType = this.getAttribute('data-alert-type');
                document.querySelectorAll('[data-alert-type]').forEach(function(b){
                    b.classList.toggle('active', b.getAttribute('data-alert-type') === alertType);
                });
            });
        });

        setInterval(function(){ if (!document.hidden) loadOverview(); }, 30000);
        document.addEventListener('visibilitychange', function(){ if (!document.hidden) loadOverview(); });
    });
})();
</script>
</body>
</html>
