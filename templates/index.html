<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时金价监控系统 - 智能计算</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">

    {% include '_nav.html' %}
    <div class="content">

        <div class="card">
            <div class="type-selector">
                <button id="typeGold" class="active" data-type="黄 金">
                    <span class="btn-icon">🥇</span> 黄 金
                </button>
                <button id="typeSilver" data-type="白 银">
                    <span class="btn-icon">🥈</span> 白 银
                </button>
            </div>
            
            <h2 id="currentPriceTitle" class="section-title">
                <span class="title-icon">📊</span>
                实时黄金价格
            </h2>
            
            <div class="price-display">
                <div class="price-content">
                    <div class="current-price" id="currentPrice">加载中...</div>
                    <div class="last-update" id="lastUpdate"></div>
                </div>
                <div class="price-decoration">
                    <div class="pulse-dot"></div>
                </div>
            </div>

            <div class="calculator-section">
                <h3 class="section-title">
                    <span class="title-icon">🧮</span>
                    智能价格计算器
                </h3>
                
                <div class="auto-calc-notice">
                    <span class="notice-icon">💡</span>
                    <span>输入价格和克重后，系统将自动计算价格差，无需点击按钮</span>
                </div>
                
                <div class="calculator-form">
                    <div class="form-group">
                        <label for="productPrice" class="form-label">
                            <span class="label-icon">💵</span>
                            商品总价（元）
                        </label>
                        <input type="number" id="productPrice" 
                               class="form-input" 
                               placeholder="请输入商品总价格" 
                               step="0.01"
                               inputmode="decimal" 
                               pattern="[0-9]*">
                    </div>

                    <div class="form-group">
                        <label for="weight" class="form-label">
                            <span class="label-icon">⚖️</span>
                            商品克重（克）
                        </label>
                        <input type="number" id="weight" 
                               class="form-input" 
                               placeholder="请输入商品重量" 
                               step="0.01" 
                               inputmode="decimal"
                               pattern="[0-9]*">
                    </div>
                </div>
            </div>

            <div class="result" id="result">
                <h3 class="result-title">
                    <span class="result-icon">📈</span>
                    计算结果
                </h3>
                <div class="price-info">
                    <div class="price-item">
                        <div class="item-label">每克价格</div>
                        <div class="item-value" id="pricePerGram">-</div>
                    </div>
                    <div class="price-item">
                        <div class="item-label">大盘金价</div>
                        <div class="item-value" id="marketPrice">-</div>
                    </div>
                </div>
                <div class="difference" id="differenceDisplay">
                    <span class="difference-icon">💰</span>
                    <span class="difference-text">总收益: - 元</span>
                </div>
            </div>
            
            <div class="alert-subscribe">
                <h3 class="alert-title">
                    <span class="alert-icon">🔔</span>
                    价格到达推送
                </h3>
                <div class="alert-form">
                    <div class="form-group">
                        <label for="alertTarget" class="form-label">
                            <span class="label-icon">🎯</span>
                            目标价格（元/克）
                        </label>
                        <input type="number" id="alertTarget" 
                               class="form-input" 
                               placeholder="输入阈值" 
                               step="0.01" 
                               inputmode="decimal">
                    </div>
                    <div class="form-group">
                        <label class="form-label">
                            <span class="label-icon">⚡</span>
                            触发条件
                        </label>
                        <select id="alertOp" class="form-select">
                            <option value="gte">达到或超过</option>
                            <option value="lte">达到或低于</option>
                        </select>
                    </div>
                    <div class="btn-group">
                        <button id="btnSubscribe" class="btn btn-primary">
                            <span class="btn-icon">📬</span>
                            订阅推送
                        </button>
                        <button id="btnUnsubscribe" class="btn btn-secondary" disabled>
                            <span class="btn-icon">❌</span>
                            取消订阅
                        </button>
                    </div>
                    <div id="alertStatus" class="status"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
/* Additional styles for enhanced components */
.section-title {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 2rem;
    color: var(--text-primary);
    font-weight: 600;
    font-size: 1.5rem;
}

.title-icon {
    font-size: 1.75rem;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
}

.price-content {
    position: relative;
    z-index: 2;
}

.price-decoration {
    position: absolute;
    top: 1rem;
    right: 1rem;
    z-index: 1;
}

.pulse-dot {
    width: 12px;
    height: 12px;
    background: rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7);
    }
    70% {
        box-shadow: 0 0 0 20px rgba(255, 255, 255, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
    }
}

.calculator-section {
    margin-bottom: 2rem;
}

.form-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
}

.label-icon {
    font-size: 1rem;
}

.form-input, .form-select {
    width: 100%;
    padding: 1rem;
    border: 2px solid var(--border-color);
    border-radius: var(--radius-md);
    font-size: 1rem;
    transition: var(--transition);
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: inherit;
}

.form-input:focus, .form-select:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    transform: translateY(-1px);
}

.result-title {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    color: var(--text-primary);
    font-weight: 600;
}

.result-icon {
    font-size: 1.25rem;
}

.item-label {
    font-size: 0.875rem;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
    font-weight: 500;
}

.item-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--primary-color);
}

.difference-icon {
    font-size: 1.5rem;
    margin-right: 0.5rem;
}

.difference-text {
    font-size: 1.75rem;
    font-weight: 700;
}

.alert-title {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    color: var(--text-primary);
    font-weight: 600;
}

.alert-icon {
    font-size: 1.25rem;
}

.alert-form {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

.btn-icon {
    font-size: 1rem;
}

.type-selector button .btn-icon {
    font-size: 1rem;
    margin-right: 0.5rem;
}

/* Enhanced type selector */
.type-selector {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    background: var(--bg-secondary);
    padding: 0.25rem;
    border-radius: var(--radius-lg);
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
    box-shadow: var(--shadow-sm);
}

.type-selector button {
    background: transparent;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-secondary);
    transition: var(--transition);
    position: relative;
    display: flex;
    align-items: center;
}

.type-selector button.active {
    background: var(--bg-primary);
    color: var(--primary-color);
    box-shadow: var(--shadow-sm);
}

.type-selector button:hover:not(.active) {
    color: var(--text-primary);
    transform: translateY(-1px);
}

/* Mobile optimizations */
@media (max-width: 768px) {
    .section-title {
        font-size: 1.25rem;
        flex-direction: column;
        text-align: center;
        gap: 0.5rem;
    }
    
    .title-icon {
        font-size: 1.5rem;
    }
    
    .type-selector {
        width: 100%;
        justify-content: center;
    }
    
    .type-selector button {
        flex: 1;
        justify-content: center;
    }
}
</style>
<script>
    // 防抖函数实现
    function debounce(func, wait) {
        let timeout;
        return function () {
            const context = this;
            const args = arguments;
            clearTimeout(timeout);
            timeout = setTimeout(function () {
                func.apply(context, args);
            }, wait);
        };
    }

    // 初始化图表
    const chartDom = document.getElementById('priceChart');
    // const priceChart = echarts.init(chartDom);

    let currentDataType = '黄 金'; // Default to Gold

    // Update title based on selected type
    function updateTitle(type) {
        document.getElementById('currentPriceTitle').textContent = `📊 实时${type}回收价格`;
    }

    // Update price display
    function updatePriceDisplay() {
        fetch(`/api/latest-price?data_type=${currentDataType}`) // Pass data_type
            .then(response => response.json())
            .then(data => {
                if (data.success && data.data) {
                    document.getElementById('currentPrice').textContent =
                        `${data.data.recycle_price} 元/克`;

                    if (data.data.created_at) { // Use created_at from the database
                        const updateTime = new Date(data.data.created_at).toLocaleString('zh-CN');
                        document.getElementById('lastUpdate').textContent =
                            `最后更新: ${updateTime}`;
                    }
                } else {
                    document.getElementById('currentPrice').textContent = '获取失败';
                    document.getElementById('lastUpdate').textContent = '';
                    console.error('获取金价失败:', data.error);
                }
            })
            .catch(error => {
                console.error('获取金价失败:', error);
                document.getElementById('currentPrice').textContent = '获取失败';
                document.getElementById('lastUpdate').textContent = '';
            });
    }

    // Update price history chart (now using /api/recent-history)
    function updatePriceChart() {
        fetch(`/api/recent-history?data_type=${currentDataType}`) // Changed to /api/recent-history
            .then(response => response.json())
            .then(history => {
                if (history.success && history.data) {
                    const dates = history.data.map(item =>
                        new Date(item.created_at).toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'})
                    );
                    const prices = history.data.map(item => item.recycle_price);

                    const option = {
                        tooltip: {
                            trigger: 'axis',
                            formatter: '{b}<br/>价格: {c} 元/克'
                        },
                        xAxis: {
                            type: 'category',
                            data: dates,
                            axisLabel: {
                                rotate: 45
                            }
                        },
                        yAxis: {
                            type: 'value',
                            name: '价格 (元/克)'
                        },
                        series: [{
                            data: prices,
                            type: 'line',
                            smooth: true,
                            lineStyle: {
                                width: 3,
                                color: '#4a86e8'
                            },
                            areaStyle: {
                                color: {
                                    type: 'linear',
                                    x: 0, y: 0, x2: 0, y2: 1,
                                    colorStops: [{
                                        offset: 0, color: 'rgba(74, 134, 232, 0.5)'
                                    }, {
                                        offset: 1, color: 'rgba(74, 134, 232, 0.1)'
                                    }]
                                }
                            }
                        }],
                        grid: {
                            left: '5%',
                            right: '5%',
                            bottom: '15%',
                            top: '10%'
                        }
                    };

                    priceChart.setOption(option);
                } else {
                    console.error('获取历史数据失败:', history.error);
                    priceChart.clear(); // Clear chart if no data
                }
            })
            .catch(error => {
                console.error('获取历史数据失败:', error);
                priceChart.clear(); // Clear chart on error
            });
    }

    // Calculate difference function
    function calculateDifference() {
        const productPrice = parseFloat(document.getElementById('productPrice').value);
        const weight = parseFloat(document.getElementById('weight').value);

        // If any input is empty or invalid, hide the result
        if (isNaN(productPrice) || isNaN(weight) || weight <= 0) {
            document.getElementById('result').style.display = 'none';
            return;
        }

        fetch('/api/calculate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                product_price: productPrice,
                weight: weight,
                data_type: currentDataType // Pass data_type to calculation
            })
        })
            .then(response => response.json())
            .then(result => {
                if (result.error) {
                    document.getElementById('result').style.display = 'none';
                    console.error('计算失败:', result.error);
                    return;
                }

                document.getElementById('pricePerGram').textContent =
                    `${result.price_per_gram.toFixed(2)} 元/克`;
                document.getElementById('marketPrice').textContent =
                    `${result.market_price.toFixed(2)} 元/克`;

                const differenceElement = document.getElementById('differenceDisplay');
                const difference = result.difference.toFixed(2);
                const total_difference = result.total_difference.toFixed(2);
                const differencePercentage = result.difference_percentage.toFixed(2);

                differenceElement.textContent = `总收益: ${0 - total_difference}`;
                // differenceElement.textContent = `价格差: ${difference} 元/克 (${differencePercentage}%)`;

                if (result.difference < 0) {
                    differenceElement.className = 'difference negative';
                    // differenceElement.innerHTML += '<br>💡 比大盘价格便宜';
                } else if (result.difference > 0) {
                    differenceElement.className = 'difference positive';
                    // differenceElement.innerHTMLrHTML += '<br>💡 比大盘价格贵';
                } else {
                    differenceElement.className = 'difference'; // Neutral style if no difference
                    // differenceElement.innerHTML += '<br>💡 与大盘价格持平';
                }

                document.getElementById('result').style.display = 'block';
            })
            .catch(error => {
                console.error('计算失败:', error);
                document.getElementById('result').style.display = 'none';
            });
    }

    // Debounced auto-calculation function
    const debouncedCalculate = debounce(calculateDifference, 300);

    // Function to handle type selection
    function selectType(type) {
        currentDataType = type;
        updateTitle(type); // Update the title
        // Update active button class
        document.querySelectorAll('.type-selector button').forEach(button => {
            if (button.dataset.type === type) {
                button.classList.add('active');
            } else {
                button.classList.remove('active');
            }
        });
        // Re-fetch data and recalculate for the new type
        updatePriceDisplay();
        // updatePriceChart();
        debouncedCalculate(); // Recalculate with new type
    }

    // Page load initialization
    document.addEventListener('DOMContentLoaded', function () {
        // Initial load for default type (Gold)
        selectType(currentDataType);

        // Event listeners for type selection buttons
        document.getElementById('typeGold').addEventListener('click', () => selectType('黄 金'));
        document.getElementById('typeSilver').addEventListener('click', () => selectType('白 银'));

        // Add input event listeners for calculator
        document.getElementById('productPrice').addEventListener('input', debouncedCalculate);
        document.getElementById('weight').addEventListener('input', debouncedCalculate);

        // 使用变量存储定时器ID，方便管理
        let priceUpdateInterval;
        let chartUpdateInterval;

        // 更新价格的函数（带可见性检测）
        function startPriceUpdate() {
            // 清除之前的定时器
            if (priceUpdateInterval) {
                clearInterval(priceUpdateInterval);
            }
            
            // 立即执行一次
            updatePriceDisplay();
            
            // 设置定时器：每30秒更新一次
            priceUpdateInterval = setInterval(function() {
                // 只在页面可见时更新（移动浏览器优化）
                if (!document.hidden) {
                    updatePriceDisplay();
                }
            }, 30000);
        }

        // 更新图表的函数（带可见性检测）
        function startChartUpdate() {
            // 清除之前的定时器
            if (chartUpdateInterval) {
                clearInterval(chartUpdateInterval);
            }
            
            // 立即执行一次
            // updatePriceChart(); // 图表已注释，暂时不执行
            
            // 设置定时器：每2分钟更新一次
            chartUpdateInterval = setInterval(function() {
                // 只在页面可见时更新（移动浏览器优化）
                if (!document.hidden) {
                    // updatePriceChart(); // 图表已注释，暂时不执行
                }
            }, 120000);
        }

        // 启动定时更新
        startPriceUpdate();
        startChartUpdate();

        // 使用 Page Visibility API 优化移动浏览器体验
        // 当页面从后台切换到前台时，立即更新数据
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                // 页面变为可见时，立即更新价格
                updatePriceDisplay();
                // 重新启动定时器（防止后台时被节流）
                startPriceUpdate();
                startChartUpdate();
            }
        });

        // Resize chart on window resize
        window.addEventListener('resize', function () {
            // priceChart.resize(); // 图表已注释，暂时不执行
        });

        let alertSource = null;
        function ensureNotificationPermission() {
            try {
                if (Notification && Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            } catch (e) {}
        }

        function showNotify(title, body) {
            try {
                if (Notification && Notification.permission === 'granted') {
                    new Notification(title, { body });
                } else {
                    const el = document.getElementById('alertStatus');
                    el.textContent = `${title}：${body}`;
                }
            } catch (e) {
                const el = document.getElementById('alertStatus');
                el.textContent = `${title}：${body}`;
            }
        }

        function subscribeAlert() {
            const target = parseFloat(document.getElementById('alertTarget').value);
            const op = document.getElementById('alertOp').value;
            if (isNaN(target)) {
                document.getElementById('alertStatus').textContent = '请输入有效的目标价格';
                return;
            }
            ensureNotificationPermission();
            const url = `/api/price-alert/subscribe?data_type=${encodeURIComponent(currentDataType)}&target=${encodeURIComponent(target)}&op=${encodeURIComponent(op)}&auto_close=true`;
            alertSource = new EventSource(url);
            document.getElementById('btnUnsubscribe').disabled = false;
            document.getElementById('alertStatus').textContent = '已订阅，等待触发...';

            alertSource.addEventListener('price', (ev) => {
                try {
                    const data = JSON.parse(ev.data);
                    document.getElementById('marketPrice').textContent = `${Number(data.price).toFixed(2)} 元/克`;
                } catch {}
            });
            alertSource.addEventListener('alert', (ev) => {
                try {
                    const data = JSON.parse(ev.data);
                    showNotify('价格到达', `当前 ${data.price} 元/克，已满足 ${op} ${target}`);
                    document.getElementById('alertStatus').textContent = '已触发推送';
                    unsubscribeAlert();
                } catch {}
            });
            alertSource.addEventListener('error', (ev) => {
                document.getElementById('alertStatus').textContent = '订阅错误或连接中断';
            });
        }

        function unsubscribeAlert() {
            if (alertSource) {
                alertSource.close();
                alertSource = null;
            }
            document.getElementById('btnUnsubscribe').disabled = true;
        }

        document.getElementById('btnSubscribe').addEventListener('click', subscribeAlert);
        document.getElementById('btnUnsubscribe').addEventListener('click', unsubscribeAlert);
    });
</script>
</body>
</html>
