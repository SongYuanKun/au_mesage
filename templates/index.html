<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时金价监控</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="container">

    {% include '_nav.html' %}

    <div class="content">
        <!-- Price Hero -->
        <div class="price-hero">
            <div class="type-tabs">
                <button class="type-tab active" data-type="黄 金">🥇 黄金</button>
                <button class="type-tab" data-type="白 银">🥈 白银</button>
            </div>
            <div class="price-main">
                <div class="price-label" id="currentPriceLabel">回收价格</div>
                <span class="price-value" id="currentPrice">--</span>
                <span class="price-unit">元/克</span>
            </div>
            <div class="price-meta">
                <span class="price-badge neutral" id="priceChange">-- --</span>
                <span class="price-update-time">
                    <span class="price-live-dot"></span>
                    <span id="lastUpdate">获取中...</span>
                </span>
            </div>
        </div>

        <!-- Two Column: Calculator + Alert -->
        <div class="grid-2">
            <!-- Calculator -->
            <div class="card">
                <h3 class="card-title">🧮 价格计算器</h3>
                <p class="card-desc">输入商品价格和克重，自动计算与大盘的价差</p>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="productPrice">商品总价（元）</label>
                        <input type="number" id="productPrice" class="form-input"
                               placeholder="如 5800" step="0.01" inputmode="decimal">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="weight">克重（克）</label>
                        <input type="number" id="weight" class="form-input"
                               placeholder="如 10.5" step="0.01" inputmode="decimal">
                    </div>
                </div>

                <div class="result-panel" id="result">
                    <div class="result-grid">
                        <div class="result-item">
                            <div class="result-item-label">每克价格</div>
                            <div class="result-item-value" id="pricePerGram">-</div>
                        </div>
                        <div class="result-item">
                            <div class="result-item-label">大盘回收价</div>
                            <div class="result-item-value" id="marketPrice">-</div>
                        </div>
                    </div>
                    <div class="result-total neutral" id="differenceDisplay">
                        差额：--
                    </div>
                </div>
            </div>

            <!-- Alert -->
            <div class="card">
                <h3 class="card-title">🔔 价格提醒</h3>
                <p class="card-desc">设置目标价格，触发后浏览器推送通知</p>

                <div class="alert-form">
                    <div class="form-group">
                        <label class="form-label" for="alertTarget">目标价格（元/克）</label>
                        <input type="number" id="alertTarget" class="form-input"
                               placeholder="如 680" step="0.01" inputmode="decimal">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="alertOp">触发条件</label>
                        <select id="alertOp" class="form-select">
                            <option value="gte">达到或超过</option>
                            <option value="lte">达到或低于</option>
                        </select>
                    </div>
                    <div class="btn-row">
                        <button id="btnSubscribe" class="btn btn-primary">订阅推送</button>
                        <button id="btnUnsubscribe" class="btn btn-secondary" disabled>取消订阅</button>
                    </div>
                    <div id="alertStatus" class="alert-status" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        数据来源于公开市场，仅供参考，不构成投资建议
    </footer>
</div>

<script>
(function(){
    var currentType = '黄 金';

    function debounce(fn, wait) {
        var timer;
        return function() {
            var ctx = this, args = arguments;
            clearTimeout(timer);
            timer = setTimeout(function(){ fn.apply(ctx, args); }, wait);
        };
    }

    function updatePriceDisplay() {
        fetch('/api/latest-price?data_type=' + encodeURIComponent(currentType))
            .then(function(r){ return r.json(); })
            .then(function(data){
                if (data.success && data.data) {
                    var price = Number(data.data.recycle_price);
                    document.getElementById('currentPrice').textContent = price.toFixed(2);
                    if (data.data.created_at) {
                        document.getElementById('lastUpdate').textContent =
                            '更新于 ' + new Date(data.data.created_at).toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
                    }
                } else {
                    document.getElementById('currentPrice').textContent = '--';
                    document.getElementById('lastUpdate').textContent = '获取失败';
                }
            })
            .catch(function(){
                document.getElementById('currentPrice').textContent = '--';
                document.getElementById('lastUpdate').textContent = '获取失败';
            });
    }

    function calculateDifference() {
        var pp = parseFloat(document.getElementById('productPrice').value);
        var w = parseFloat(document.getElementById('weight').value);
        var resultEl = document.getElementById('result');

        if (isNaN(pp) || isNaN(w) || w <= 0) {
            resultEl.style.display = 'none';
            return;
        }

        fetch('/api/calculate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ product_price: pp, weight: w, data_type: currentType })
        })
        .then(function(r){ return r.json(); })
        .then(function(res){
            if (res.error) { resultEl.style.display = 'none'; return; }

            document.getElementById('pricePerGram').textContent = res.price_per_gram.toFixed(2);
            document.getElementById('marketPrice').textContent = res.market_price.toFixed(2);

            var diff = res.total_difference;
            var el = document.getElementById('differenceDisplay');
            var sign = diff > 0 ? '+' : '';
            el.textContent = '总价差：' + sign + diff.toFixed(2) + ' 元';

            if (diff > 0) {
                el.className = 'result-total negative';
            } else if (diff < 0) {
                el.className = 'result-total positive';
            } else {
                el.className = 'result-total neutral';
            }

            resultEl.style.display = 'block';
        })
        .catch(function(){ resultEl.style.display = 'none'; });
    }

    var debouncedCalc = debounce(calculateDifference, 300);

    function selectType(type) {
        currentType = type;
        document.querySelectorAll('.type-tab').forEach(function(btn){
            btn.classList.toggle('active', btn.getAttribute('data-type') === type);
        });
        updatePriceDisplay();
        debouncedCalc();
    }

    /* Alert subscription via SSE */
    var alertSource = null;

    function showAlertStatus(msg) {
        var el = document.getElementById('alertStatus');
        el.textContent = msg;
        el.style.display = 'block';
    }

    function ensureNotifPermission() {
        try { if (Notification && Notification.permission === 'default') Notification.requestPermission(); } catch(e){}
    }

    function showNotify(title, body) {
        try {
            if (Notification && Notification.permission === 'granted') {
                new Notification(title, { body: body });
            } else {
                showAlertStatus(title + '：' + body);
            }
        } catch(e) {
            showAlertStatus(title + '：' + body);
        }
    }

    function subscribeAlert() {
        var target = parseFloat(document.getElementById('alertTarget').value);
        var op = document.getElementById('alertOp').value;
        if (isNaN(target)) { showAlertStatus('请输入有效的目标价格'); return; }
        ensureNotifPermission();
        var url = '/api/price-alert/subscribe?data_type=' + encodeURIComponent(currentType) +
                  '&target=' + encodeURIComponent(target) + '&op=' + encodeURIComponent(op) + '&auto_close=true';
        alertSource = new EventSource(url);
        document.getElementById('btnUnsubscribe').disabled = false;
        showAlertStatus('已订阅，等待价格触发...');

        alertSource.addEventListener('price', function(ev){
            try { var d = JSON.parse(ev.data); document.getElementById('marketPrice').textContent = Number(d.price).toFixed(2); } catch(e){}
        });
        alertSource.addEventListener('alert', function(ev){
            try {
                var d = JSON.parse(ev.data);
                var opText = op === 'gte' ? '达到或超过' : '达到或低于';
                showNotify('价格触发', '当前 ' + d.price + ' 元/克，已' + opText + ' ' + target);
                showAlertStatus('已触发通知');
                unsubscribeAlert();
            } catch(e){}
        });
        alertSource.addEventListener('error', function(){
            showAlertStatus('连接中断，请重试');
        });
    }

    function unsubscribeAlert() {
        if (alertSource) { alertSource.close(); alertSource = null; }
        document.getElementById('btnUnsubscribe').disabled = true;
    }

    /* Init */
    document.addEventListener('DOMContentLoaded', function(){
        selectType(currentType);

        document.querySelectorAll('.type-tab').forEach(function(btn){
            btn.addEventListener('click', function(){ selectType(this.getAttribute('data-type')); });
        });

        document.getElementById('productPrice').addEventListener('input', debouncedCalc);
        document.getElementById('weight').addEventListener('input', debouncedCalc);
        document.getElementById('btnSubscribe').addEventListener('click', subscribeAlert);
        document.getElementById('btnUnsubscribe').addEventListener('click', unsubscribeAlert);

        var priceTimer = setInterval(function(){
            if (!document.hidden) updatePriceDisplay();
        }, 30000);

        document.addEventListener('visibilitychange', function(){
            if (!document.hidden) updatePriceDisplay();
        });
    });
})();
</script>
</body>
</html>
