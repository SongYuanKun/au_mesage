<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koen · 趋势图表</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script src="{{ url_for('static', filename='js/metal-series.js') }}"></script>
</head>
<body>
<div class="container">

    {% include '_nav.html' %}

    <div class="content">
        <!-- Real-time chart (last 30 min) -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">⏱ 近30分钟实时走势</h2>
                <div class="type-tabs">
                    <button id="btnGold" class="type-tab active" data-type="黄 金">🥇 黄金</button>
                    <button id="btnSilver" class="type-tab" data-type="白 银">🥈 白银</button>
                </div>
            </div>

            <div id="todayChart" class="chart-container"></div>
            <div id="noDailyChartData" class="chart-placeholder" style="display:none;">
                <div class="chart-placeholder-icon">📊</div>
                <div class="chart-placeholder-text">暂无数据</div>
                <div class="chart-placeholder-sub">请稍后刷新重试</div>
            </div>

            <div class="chart-info">
                <div class="chart-info-item">
                    <span>ℹ️</span>
                    <span>展示最近 30 分钟数据，每 30 秒自动刷新</span>
                </div>
                <div class="chart-info-item">
                    <span>🔄</span>
                    <span id="lastRefresh">最后更新：-</span>
                </div>
            </div>
        </div>

        <!-- 7-day trend -->
        <div class="card">
            <h2 class="card-title" style="margin-bottom:1.25rem;">📈 近7天回收价格趋势</h2>

            <div id="trendChart" class="chart-container"></div>
            <div id="noChartData" class="chart-placeholder" style="display:none;">
                <div class="chart-placeholder-icon">📊</div>
                <div class="chart-placeholder-text">暂无趋势数据</div>
                <div class="chart-placeholder-sub">请稍后刷新重试</div>
            </div>

            <div class="stats-section">
                <h3 class="stats-title">📊 近7天统计</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">平均回收价</div>
                        <div class="stat-value" id="summaryAvg">-</div>
                        <span class="stat-tag neutral">均值</span>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">最高回收价</div>
                        <div class="stat-value" id="summaryMax">-</div>
                        <span class="stat-tag up">最高</span>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">最低回收价</div>
                        <div class="stat-value" id="summaryMin">-</div>
                        <span class="stat-tag down">最低</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    {% include '_footer.html' %}
</div>

<script>
(function () {
    var MS = window.AuMetalSeries;
    if (!MS) {
        console.error('AuMetalSeries 未加载');
        return;
    }

    var TYPE_GOLD = MS.METALS.gold.domestic;
    var TYPE_SILVER = MS.METALS.silver.domestic;
    var currentMetalKey = 'gold';

    var btnGold = document.getElementById('btnGold');
    var btnSilver = document.getElementById('btnSilver');
    var noDailyEl = document.getElementById('noDailyChartData');
    var noChartEl = document.getElementById('noChartData');

    var todayChart = echarts.init(document.getElementById('todayChart'));
    var trendChart = echarts.init(document.getElementById('trendChart'));

    var chartColors = { today: '#6366f1', trend: '#4f46e5' };
    var lastHourDtype = null;
    var last7Dtype = null;

    function makeLineOption(xData, yData, color, yAxisName) {
        var unit = yAxisName || '元/克';
        return {
            tooltip: {
                trigger: 'axis',
                formatter: function (p) {
                    var v = p[0].data == null ? '-' : p[0].data;
                    return p[0].axisValue + '<br/>价格：' + v + ' ' + unit;
                },
            },
            xAxis: { type: 'category', data: xData, axisLabel: { rotate: 45, fontSize: 11 } },
            yAxis: { type: 'value', name: unit, scale: true },
            series: [{
                data: yData,
                type: 'line',
                smooth: true,
                lineStyle: { color: color, width: 2.5 },
                itemStyle: { color: color },
                areaStyle: {
                    color: {
                        type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [
                            { offset: 0, color: color + '30' },
                            { offset: 1, color: color + '05' },
                        ],
                    },
                },
                connectNulls: false,
            }],
            grid: { left: '6%', right: '4%', bottom: '18%', top: '8%' },
        };
    }

    function countValidPrices(prices) {
        return (prices || []).filter(function (v) {
            return typeof v === 'number' && !isNaN(v);
        }).length;
    }

    function fetchToday() {
        noDailyEl.style.display = 'none';
        return MS.getUsdCnyFactor()
            .then(function (factor) {
                return MS.fetchLastHourRows(currentMetalKey).then(function (pack) {
                    lastHourDtype = pack.dtype;
                    var rows = MS.filterLast30Minutes(pack.rows);
                    if (!rows.length) {
                        noDailyEl.style.display = 'block';
                        todayChart.clear();
                        return;
                    }
                    var times = rows.map(function (it) {
                        return it.created_at || '';
                    });
                    var prices = rows.map(function (it) {
                        return MS.convertRecyclePrice(it.recycle_price, pack.dtype, factor);
                    });
                    var yName = MS.yAxisLabelFor(pack.dtype);
                    todayChart.setOption(
                        makeLineOption(times, prices, chartColors.today, yName),
                        true
                    );
                    document.getElementById('lastRefresh').textContent =
                        '最后更新：' + new Date().toLocaleTimeString('zh-CN');
                });
            })
            .catch(function (e) {
                console.error('fetchToday', e);
                noDailyEl.style.display = 'block';
                todayChart.clear();
            });
    }

    function fetchLast7() {
        return MS.fetchLast7DaysSeries(currentMetalKey)
            .then(function (series) {
                last7Dtype = series.dtype;
                var dates = series.dates;
                var prices = series.prices;
                if (countValidPrices(prices) < 1) {
                    noChartEl.style.display = 'block';
                    trendChart.clear();
                    renderStats([]);
                    return;
                }
                noChartEl.style.display = 'none';
                trendChart.setOption(
                    makeLineOption(dates, prices, chartColors.trend, MS.yAxisLabelFor(series.dtype)),
                    true
                );
                renderStats(prices);
            })
            .catch(function (e) {
                console.error('fetchLast7', e);
                noChartEl.style.display = 'block';
                trendChart.clear();
                renderStats([]);
            });
    }

    function renderStats(prices) {
        var nums = (prices || []).filter(function (v) {
            return typeof v === 'number' && !isNaN(v);
        });
        if (!nums.length) {
            document.getElementById('summaryAvg').textContent = '-';
            document.getElementById('summaryMax').textContent = '-';
            document.getElementById('summaryMin').textContent = '-';
            return;
        }
        var sum = nums.reduce(function (a, b) { return a + b; }, 0);
        document.getElementById('summaryAvg').textContent = (sum / nums.length).toFixed(2);
        document.getElementById('summaryMax').textContent = Math.max.apply(null, nums).toFixed(2);
        document.getElementById('summaryMin').textContent = Math.min.apply(null, nums).toFixed(2);
    }

    function setMetalKey(key) {
        currentMetalKey = key;
        btnGold.classList.toggle('active', key === 'gold');
        btnSilver.classList.toggle('active', key === 'silver');
        fetchToday();
        fetchLast7();
    }

    var todayTimer;
    var trendTimer;
    function startTimers() {
        if (todayTimer) clearInterval(todayTimer);
        todayTimer = setInterval(function () {
            if (!document.hidden) fetchToday();
        }, 30000);
        if (trendTimer) clearInterval(trendTimer);
        trendTimer = setInterval(function () {
            if (!document.hidden) fetchLast7();
        }, 120000);
    }

    function refreshAll() {
        fetchToday();
        fetchLast7();
    }

    btnGold.addEventListener('click', function () { setMetalKey('gold'); });
    btnSilver.addEventListener('click', function () { setMetalKey('silver'); });
    window.addEventListener('resize', function () {
        todayChart.resize();
        trendChart.resize();
    });
    document.addEventListener('visibilitychange', function () {
        if (!document.hidden) {
            refreshAll();
            startTimers();
        }
    });
    window.addEventListener('au-price-unit-change', refreshAll);

    document.addEventListener('DOMContentLoaded', function () {
        setMetalKey('gold');
        startTimers();
    });
})();
</script>
</body>
</html>
