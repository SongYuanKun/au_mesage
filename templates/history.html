<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趋势图表 — 金价监控</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="container">

    {% include '_nav.html' %}

    <div class="content">
        <!-- Real-time chart (last 30 min) -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">⏱ 近30分钟实时走势</h2>
                <div class="type-tabs">
                    <button id="btnGold" class="type-tab active" data-type="黄 金">🥇 黄金</button>
                    <button id="btnSilver" class="type-tab" data-type="白 银">🥈 白银</button>
                </div>
            </div>

            <div id="todayChart" class="chart-container"></div>
            <div id="noDailyChartData" class="chart-placeholder" style="display:none;">
                <div class="chart-placeholder-icon">📊</div>
                <div class="chart-placeholder-text">暂无数据</div>
                <div class="chart-placeholder-sub">请稍后刷新重试</div>
            </div>

            <div class="chart-info">
                <div class="chart-info-item">
                    <span>ℹ️</span>
                    <span>展示最近 30 分钟数据，每 30 秒自动刷新</span>
                </div>
                <div class="chart-info-item">
                    <span>🔄</span>
                    <span id="lastRefresh">最后更新：-</span>
                </div>
            </div>
        </div>

        <!-- 7-day trend -->
        <div class="card">
            <h2 class="card-title" style="margin-bottom:1.25rem;">📈 近7天回收价格趋势</h2>

            <div id="trendChart" class="chart-container"></div>
            <div id="noChartData" class="chart-placeholder" style="display:none;">
                <div class="chart-placeholder-icon">📊</div>
                <div class="chart-placeholder-text">暂无趋势数据</div>
                <div class="chart-placeholder-sub">请稍后刷新重试</div>
            </div>

            <div class="stats-section">
                <h3 class="stats-title">📊 近7天统计</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">平均回收价</div>
                        <div class="stat-value" id="summaryAvg">-</div>
                        <span class="stat-tag neutral">均值</span>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">最高回收价</div>
                        <div class="stat-value" id="summaryMax">-</div>
                        <span class="stat-tag up">最高</span>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">最低回收价</div>
                        <div class="stat-value" id="summaryMin">-</div>
                        <span class="stat-tag down">最低</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        数据来源于公开市场，仅供参考，不构成投资建议
    </footer>
</div>

<script>
(function(){
    var TYPE_GOLD = '黄 金', TYPE_SILVER = '白 银';
    var currentType = TYPE_GOLD;

    var btnGold = document.getElementById('btnGold');
    var btnSilver = document.getElementById('btnSilver');
    var noDailyEl = document.getElementById('noDailyChartData');
    var noChartEl = document.getElementById('noChartData');

    var todayChart = echarts.init(document.getElementById('todayChart'));
    var trendChart = echarts.init(document.getElementById('trendChart'));

    var chartColors = { today: '#f97316', trend: '#6366f1' };

    function makeLineOption(xData, yData, color, yAxisName) {
        return {
            tooltip: { trigger: 'axis', formatter: function(p){ return p[0].axisValue + '<br/>回收价：' + (p[0].data == null ? '-' : p[0].data) + ' 元/克'; }},
            xAxis: { type: 'category', data: xData, axisLabel: { rotate: 45, fontSize: 11 } },
            yAxis: { type: 'value', name: yAxisName || '元/克', scale: true },
            series: [{
                data: yData, type: 'line', smooth: true,
                lineStyle: { color: color, width: 2.5 },
                itemStyle: { color: color },
                areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                    colorStops: [{ offset: 0, color: color + '30' }, { offset: 1, color: color + '05' }]
                }},
                connectNulls: false
            }],
            grid: { left: '6%', right: '4%', bottom: '18%', top: '8%' }
        };
    }

    /** 与文案「近30分钟」一致：按 created_at 过滤，兜底保留全部一小时数据 */
    function filterLast30Minutes(rows) {
        if (!rows || !rows.length) return [];
        var cutoff = Date.now() - 30 * 60 * 1000;
        var filtered = rows.filter(function (it) {
            if (!it.created_at) return false;
            var t = Date.parse(it.created_at);
            return !isNaN(t) && t >= cutoff;
        });
        return filtered.length ? filtered : rows;
    }

    async function fetchToday() {
        noDailyEl.style.display = 'none';
        try {
            var resp = await fetch('/api/last-1-hour?data_type=' + encodeURIComponent(currentType));
            var j = await resp.json().catch(function () { return null; });
            if (!resp.ok || !j || j.success === false) {
                noDailyEl.style.display = 'block';
                todayChart.clear();
                return;
            }
            if (Array.isArray(j.data) && j.data.length > 0) {
                var sliceRows = filterLast30Minutes(j.data);
                var times = sliceRows.map(function (it) { return it.created_at || ''; });
                var prices = sliceRows.map(function (it) {
                    return it.recycle_price == null ? null : Number(it.recycle_price);
                });
                todayChart.setOption(makeLineOption(times, prices, chartColors.today, '回收价格'), true);
                document.getElementById('lastRefresh').textContent = '最后更新：' + new Date().toLocaleTimeString('zh-CN');
            } else {
                noDailyEl.style.display = 'block';
                todayChart.clear();
            }
        } catch (e) {
            console.error('fetchToday', e);
            noDailyEl.style.display = 'block';
            todayChart.clear();
        }
    }

    async function fetchLast7() {
        try {
            var resp = await fetch('/api/last-7-days?data_type=' + encodeURIComponent(currentType));
            var j = await resp.json().catch(function () { return null; });
            if (!resp.ok || !j) {
                noChartEl.style.display = 'block';
                trendChart.clear();
                renderStats([]);
                return;
            }
            if (j.success && Array.isArray(j.data) && j.data.length > 0) {
                noChartEl.style.display = 'none';
                var dates = j.data.map(function(d){ return d.date; });
                var prices = j.data.map(function(d){ return d.recycle_price == null ? null : Number(d.recycle_price); });
                trendChart.setOption(makeLineOption(dates, prices, chartColors.trend, '回收价格'), true);
                renderStats(prices);
            } else {
                noChartEl.style.display = 'block'; trendChart.clear(); renderStats([]);
            }
        } catch(e) {
            console.error('fetchLast7', e);
            noChartEl.style.display = 'block'; trendChart.clear(); renderStats([]);
        }
    }

    function renderStats(prices) {
        var nums = (prices || []).filter(function(v){ return typeof v === 'number' && !isNaN(v); });
        if (!nums.length) {
            document.getElementById('summaryAvg').textContent = '-';
            document.getElementById('summaryMax').textContent = '-';
            document.getElementById('summaryMin').textContent = '-';
            return;
        }
        var sum = nums.reduce(function(a,b){ return a+b; }, 0);
        document.getElementById('summaryAvg').textContent = (sum / nums.length).toFixed(2);
        document.getElementById('summaryMax').textContent = Math.max.apply(null, nums).toFixed(2);
        document.getElementById('summaryMin').textContent = Math.min.apply(null, nums).toFixed(2);
    }

    function setType(type) {
        currentType = type;
        btnGold.classList.toggle('active', type === TYPE_GOLD);
        btnSilver.classList.toggle('active', type === TYPE_SILVER);
        fetchToday(); fetchLast7();
    }

    var todayTimer, trendTimer;
    function startTimers() {
        if (todayTimer) clearInterval(todayTimer);
        todayTimer = setInterval(function(){ if(!document.hidden) fetchToday(); }, 30000);
        if (trendTimer) clearInterval(trendTimer);
        trendTimer = setInterval(function(){ if(!document.hidden) fetchLast7(); }, 120000);
    }

    btnGold.addEventListener('click', function(){ setType(TYPE_GOLD); });
    btnSilver.addEventListener('click', function(){ setType(TYPE_SILVER); });
    window.addEventListener('resize', function(){ todayChart.resize(); trendChart.resize(); });
    document.addEventListener('visibilitychange', function(){ if(!document.hidden){ fetchToday(); fetchLast7(); startTimers(); }});

    document.addEventListener('DOMContentLoaded', function(){
        setType(currentType);
        startTimers();
    });
})();
</script>
</body>
</html>
