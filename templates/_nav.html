<nav class="site-nav">
    <div class="nav-inner">
        <a href="/" class="nav-brand">
            <span class="nav-brand-icon">Au</span>
            <span>金价监控</span>
        </a>
        <div class="nav-links" id="navLinks">
            <a href="/" class="nav-link" data-page="index">
                <span class="nav-link-icon">📊</span>
                <span>实时价格</span>
            </a>
            <a href="/history" class="nav-link" data-page="history">
                <span class="nav-link-icon">📈</span>
                <span>趋势图表</span>
            </a>
        </div>
        <button class="nav-toggle" id="navToggle" aria-label="菜单">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>

<script>
(function(){
    var path = location.pathname;
    var links = document.querySelectorAll('.nav-link');
    links.forEach(function(link){
        var page = link.getAttribute('data-page');
        if ((page === 'index' && path === '/') || (page === 'history' && path === '/history')) {
            link.classList.add('active');
        }
    });
    var toggle = document.getElementById('navToggle');
    var menu = document.getElementById('navLinks');
    if (toggle && menu) {
        toggle.addEventListener('click', function(){
            menu.classList.toggle('open');
        });
        document.addEventListener('click', function(e){
            if (!toggle.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.remove('open');
            }
        });
    }
})();
</script>
