# 方案 A：仅应用容器，MySQL 为外部实例（云 RDS / 自建主机等）
# 启动：docker compose up --build -d   （需本机 .env，见 .env.example）
#
# 若需要 Compose 内自带 MySQL，请使用 docker-compose.mysql.yml + .env.mysql
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: my-au:latest
    container_name: my-au
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8083:8083"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
